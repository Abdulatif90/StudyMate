name: backend-ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ruff-and-pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - run: pip install -r requirements.txt -r requirements-dev.txt

      - run: ruff check .

      # No real DATABASE_URL/CLERK_* here on purpose: db.py/auth.py tests
      # mock Settings instead of hitting Neon/Clerk, so the suite needs no
      # secrets to pass in CI.
      - run: pytest tests -q
